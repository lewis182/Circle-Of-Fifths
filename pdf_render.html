<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.4.120/build/pdf.min.js"></script>
</head>
<body>
<canvas id="c"></canvas>
<div id="status">Loading...</div>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.4.120/build/pdf.worker.min.js';

async function run() {
  const resp = await fetch('uploads/Piano-chords-App files CGD FBb Web.pdf');
  const buf = await resp.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data: buf}).promise;
  document.getElementById('status').textContent = 'Pages: ' + pdf.numPages;

  const pages = [1,4,5,6,7,8,10,11,12];
  for (const pn of pages) {
    const page = await pdf.getPage(pn);
    const vp = page.getViewport({scale: 1.8});
    const canvas = document.createElement('canvas');
    canvas.width = vp.width; canvas.height = vp.height;
    canvas.style.border = '2px solid #333';
    canvas.style.display = 'block';
    canvas.style.marginBottom = '8px';
    document.body.appendChild(canvas);
    const ctx = canvas.getContext('2d');
    await page.render({canvasContext: ctx, viewport: vp}).promise;
    document.getElementById('status').textContent = 'Done page ' + pn;
  }
  document.getElementById('status').textContent = 'All done';
}
run();
</script>
</body>
</html>
