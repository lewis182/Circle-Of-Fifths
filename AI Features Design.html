// ── Mini Piano (decorative) ───────────────────────────────────────────────
const MiniPiano = ({ highlighted = [], width = 300 }) => {
  const whites = [0,2,4,5,7,9,11,12];
  const blacks = [{off:1,li:0},{off:3,li:1},{off:6,li:3},{off:8,li:4},{off:10,li:5}];
  const ww = width / whites.length;
  const wh = ww * 3.5;
  const bw = ww * 0.6; const bh = wh * 0.62;
  return (
    <svg width={width} height={wh+2} style={{display:'block',border:'1px solid #ddd',borderRadius:4}}>
      {whites.map((s,i) => (
        <rect key={s} x={i*ww+0.5} y={0.5} width={ww-1} height={wh-1} rx={2}
          fill={highlighted.includes(s) ? ORANGE : '#fff'} stroke="#ddd" strokeWidth={1}/>
      ))}
      {blacks.map(({off,li}) => (
        <rect key={off} x={(li+1)*ww-bw/2} y={0.5} width={bw} height={bh} rx={2}
          fill={highlighted.includes(off) ? ORANGE : '#222'} stroke="#000" strokeWidth={1}/>
      ))}
    </svg>
  );
};

// ── FEATURE 3: Quiz Modal ─────────────────────────────────────────────────
const Feature3 = () => {
  const [selected, setSelected] = React.useState(null);
  const options = ['C, E, G','C, Eb, G','C, E, G#','C, F, G'];
  const correct = 0;
  return (
    <div style={{
      width:380,background:'rgba(0,0,0,0.45)',display:'flex',
      alignItems:'center',justifyContent:'center',padding:20,
      minHeight:480,
    }}>
      <div style={{
        background:'#fff',borderRadius:16,padding:'20px',width:'100%',
        boxShadow:'0 20px 60px rgba(0,0,0,0.3)',
      }}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
          <AIPill label="CHORD QUIZ"/>
          <span style={{marginLeft:'auto',fontSize:11,color:'#aaa'}}>Q 3 of 5</span>
        </div>
        <div style={{
          background:'#f0ebe4',borderRadius:10,padding:'14px',marginBottom:16,
        }}>
          <p style={{fontSize:14,fontWeight:600,color:'#1a1a1a',lineHeight:1.5}}>
            Which notes make up a <strong style={{color:ORANGE}}>C Major</strong> chord?
          </p>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
          {options.map((o,i)=>{
            const isSelected = selected===i;
            const isCorrect  = i===correct;
            const showResult = selected!==null;
            let bg='#fff', border='#ddd', color='#333';
            if (showResult && isCorrect)  { bg='#e8f5e9'; border='#4caf50'; color='#2e7d32'; }
            if (showResult && isSelected && !isCorrect) { bg='#ffebee'; border='#ef5350'; color='#c62828'; }
            return (
              <button key={i} onClick={()=>!selected&&setSelected(i)} style={{
                padding:'10px 14px',borderRadius:8,border:`1.5px solid ${border}`,
                background:bg,color,fontSize:12,fontWeight:600,
                cursor:'pointer',textAlign:'left',
                display:'flex',alignItems:'center',gap:8,
              }}>
                <span style={{
                  width:22,height:22,borderRadius:'50%',
                  background: showResult&&isCorrect?'#4caf50':showResult&&isSelected?'#ef5350':ORANGE,
                  color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',
                  fontSize:11,fontWeight:700,flexShrink:0,
                }}>{String.fromCharCode(65+i)}</span>
                {o}
                {showResult && isCorrect && <span style={{marginLeft:'auto'}}>✓</span>}
                {showResult && isSelected && !isCorrect && <span style={{marginLeft:'auto'}}>✗</span>}
              </button>
            );
          })}
        </div>
        {selected!==null && (
          <AIBubble compact>
            {selected===correct
              ? '✓ Correct! C Major = C, E, G — built by stacking a major 3rd (4 semitones) then a minor 3rd (3 semitones).'
              : '✗ Not quite. C Major is C, E, G. You picked the wrong spelling of the 3rd. Remember: Major chords always use the natural (unaltered) 3rd.'}
          </AIBubble>
        )}
      </div>
    </div>
  );
};
